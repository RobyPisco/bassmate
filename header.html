<header class="top-dashboard">
  <!-- Minimal Top Bar -->
  <div class="td-row-main td-nav-bar">
    <a href="index.html" class="sb-logo" data-i18n-title="home_title" title="Torna alla Home Page" style="text-decoration:none; color:inherit;">
      <div class="logo-icon">𝄢</div>
      <div class="logo-text">Bassmate<small>PiscoFactory</small></div>
    </a>
    
    <!-- Tab pills (centro) -->
    <nav class="header-tab-row" aria-label="Navigazione principale">
      <button class="tab-btn active" data-tab="studio">
        <span class="tab-icon">🎸</span>
        <span class="tab-label" data-i18n="studio">Studio</span>
      </button>
      <button class="tab-btn" data-tab="quiz">
        <span class="tab-icon">🎯</span>
        <span class="tab-label" data-i18n="nav_quiz">Quiz</span>
      </button>
      <button class="tab-btn" data-tab="tuner">
        <span class="tab-icon">🎙️</span>
        <span class="tab-label" data-i18n="nav_tuner">Tuner</span>
      </button>
      <button class="tab-btn" data-tab="metro">
        <span class="tab-icon">🥁</span>
        <span class="tab-label" data-i18n="nav_metro">Metro</span>
      </button>
      <button class="tab-btn" data-tab="tab">
        <span class="tab-icon">📝</span>
        <span class="tab-label" data-i18n="tab_title">Tab</span>
      </button>
    </nav>

    <!-- Settings inline -->
    <div class="header-settings">
      <div class="lang-ctrl" id="langCtrl">
        <button class="p on" data-v="it">IT</button>
        <button class="p" data-v="en">EN</button>
      </div>
      <button class="icon-btn-text" id="themeTogBtn">🌙 Dark</button>
      <button class="icon-btn-text" id="audioTogBtn">🔊 ON</button>
    </div>

    <!-- Icone destra -->
    <div class="td-icons">
      <button class="icon-btn export-btn-sm" id="kbdHintBtn" data-i18n-title="kbd_hint" title="Scorciatoie tastiera" onclick="toggleKbdPanel()">⌨️</button>
      <button class="icon-btn export-btn-sm" id="shareBtn" data-i18n-title="share_btn" title="Condividi">🔗</button>
      <button class="icon-btn export-btn-sm" id="snapshotBtn" data-i18n-title="snapshot_btn" title="Esporta immagine fretboard">📸</button>
      <button class="icon-btn export-btn-sm" id="exportBtn" data-i18n-title="export_btn" title="Stampa / Esporta PDF">🖨️</button>
      <a href="grids.html" class="icon-btn export-btn-sm" data-i18n-title="grids_btn_title" title="Manici vuoti da stampare" style="text-decoration:none;">📋</a>
      <a href="exercises.html" class="icon-btn export-btn-sm" data-i18n-title="exercises_btn_title" title="Esercizi pratici" style="text-decoration:none;">📚</a>
      <select id="favCtrl" class="sel-wrap" style="display:none; padding:4px; font-size:12px; background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:6px; cursor:pointer; font-weight:bold;">
        <option value="" data-i18n="fav_def">🔖 Preferiti</option>
      </select>
      <button class="icon-btn export-btn-sm" id="favBtn" data-i18n-title="fav_save" title="Salva Preferito">❤️</button>
      <button class="icon-btn export-btn-sm" id="favDelBtn" data-i18n-title="fav_del_title" title="Elimina preferito selezionato" style="display:none; color:#ef4444; border-color:rgba(239,68,68,0.4);">🗑️</button>
      <a href="contact.html" class="icon-btn export-btn-sm" data-i18n-title="contact_title" title="Contatti" style="text-decoration:none;">📧</a>
      <a href="help.html" class="icon-btn export-btn-sm" data-i18n-title="help_btn" title="Guida e Manuale" style="text-decoration:none;">❓</a>
      <a href="donate.html" class="icon-btn donate-btn-sm" data-i18n-title="coffee" title="Offrimi un caffè" style="text-decoration:none;">☕</a>
    </div>
  </div>

  <!-- Music Controls (Visibili solo nel Tab Studio) -->
  <div class="music-controls" id="studioMusicControls">
    <!-- Riga 1: Note + Display opts + Azioni -->
    <div class="ctrl-row" id="displayOptsRow">
      <button class="p mini-btn transp-btn" id="transpDn" data-i18n-title="transp_dn_title" title="Semitono giù">&#9664;</button>
      <div class="hz-grid root-scroll" id="rootCtrl"></div>
      <button class="p mini-btn transp-btn" id="transpUp" data-i18n-title="transp_up_title" title="Semitono su">&#9654;</button>
      <div class="opts-divider"></div>
      <select id="tuningCtrl" class="opt-sel" data-i18n-title="tuning" title="Accordatura"></select>
      <select id="labelCtrl" class="opt-sel" data-i18n-title="labels" title="Etichette">
        <option value="deg" data-i18n="degrees">Gradi</option>
        <option value="note" data-i18n="notes">Note (C,D,E)</option>
        <option value="solfege" data-i18n="solfege">Note (Do,Re,Mi)</option>
        <option value="finger" data-i18n="finger">Dita (Box)</option>
      </select>
      <select id="viewCtrl" class="opt-sel" data-i18n-title="settings" title="Vista">
        <option value="full" data-i18n="all">Tutto</option>
        <option value="box" data-i18n="box">Box 5fr</option>
      </select>
      <select id="handCtrl" class="opt-sel" data-i18n-title="hand" title="Mano">
        <option value="right" data-i18n="right">Destro</option>
        <option value="left" data-i18n="lefty">Mancino</option>
      </select>
      <div class="opts-divider"></div>
      <button class="p header-action-btn metro-prominent" id="metroTogBtn" data-i18n-title="metro_btn" title="Metronomo">🥁 <span data-i18n="metro_btn_lbl">Metro</span></button>
      <button class="p header-action-btn" id="resetBtn" data-i18n-title="reset_btn" title="Reset Tastiera">🔄 <span data-i18n="reset_btn">Reset</span></button>
    </div>

    <!-- Riga 2: Scale selector -->
    <div class="scroller-row scales-row">
      <div class="sg-tabs" id="sgTabs">
        <div class="sg-tab on" data-g="base" data-i18n="base">Base</div>
        <div class="sg-tab"    data-g="modes" data-i18n="modes">Modi</div>
        <div class="sg-tab"    data-g="arps" data-i18n="arps">Arp</div>
        <div class="sg-tab"    data-g="other" data-i18n="other">Altro</div>
      </div>
      <div class="panels-hz scales-scroll">
        <div id="sg-base"  class="sg-panel show" data-g="base"></div>
        <div id="sg-modes" class="sg-panel"      data-g="modes"></div>
        <div id="sg-arps"  class="sg-panel"      data-g="arps"></div>
        <div id="sg-other" class="sg-panel"      data-g="other"></div>
      </div>
    </div>
  </div>
</header>
