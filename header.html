<header class="top-dashboard">
  <!-- Minimal Top Bar -->
  <div class="td-row-main td-nav-bar">
    <a href="index.html" class="sb-logo" title="Torna alla Home Page" style="text-decoration:none; color:inherit;">
      <div class="logo-icon">𝄢</div>
      <div class="logo-text">Bassmate<small>PiscoFactory</small></div>
    </a>
    
    <div class="td-icons" style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
      <button class="icon-btn export-btn-sm" id="kbdHintBtn" title="Scorciatoie tastiera" onclick="toggleKbdPanel()">⌨️</button>
      <button class="icon-btn export-btn-sm" id="shareBtn" data-i18n-title="share_btn" title="Condividi">🔗</button>
      <button class="icon-btn export-btn-sm" id="snapshotBtn" title="Esporta immagine fretboard">📸</button>
      <button class="icon-btn export-btn-sm" id="exportBtn" data-i18n-title="export_btn" title="Stampa / Esporta PDF manico corrente">🖨️</button>
      <a href="grids.html" class="icon-btn export-btn-sm" title="Manici vuoti da stampare" style="text-decoration:none;">📋</a>
      <a href="exercises.html" class="icon-btn export-btn-sm" title="Esercizi pratici" style="text-decoration:none;">📚</a>
      <select id="favCtrl" class="sel-wrap" style="width:auto; display:none; padding:4px; font-size:12px; background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:6px; cursor:pointer; font-weight:bold; margin-left:6px;">
        <option value="" data-i18n="fav_def">🔖 Preferiti</option>
      </select>
      <button class="icon-btn export-btn-sm" id="favBtn" data-i18n-title="fav_save" title="Salva Preferito">❤️</button>
      <button class="icon-btn export-btn-sm" id="favDelBtn" title="Elimina preferito selezionato" style="display:none; color:#ef4444; border-color:rgba(239,68,68,0.4);">🗑️</button>
      <a href="contact.html" class="icon-btn export-btn-sm" title="Contatti">📧</a>
      <a href="donate.html" class="icon-btn donate-btn-sm" data-i18n-title="coffee" title="Offrimi un caffè" style="text-decoration:none;">☕</a>
    </div>
  </div>

  <!-- Music Controls (Visibili solo nel Tab Studio) -->
  <div class="music-controls" id="studioMusicControls">
    <!-- Root Note + Metro + Reset in one row -->
    <div style="display:flex; align-items:center; gap:8px; padding: 0 16px 6px;">
      <!-- ◄ notes ► gruppo compatto -->
      <div style="display:flex; align-items:center; gap:0;">
        <button class="p mini-btn transp-btn" id="transpDn" title="Semitono giù">&#9664;</button>
        <div class="hz-grid root-scroll" id="rootCtrl"></div>
        <button class="p mini-btn transp-btn" id="transpUp" title="Semitono su">&#9654;</button>
      </div>
      <!-- Metro + Reset -->
      <button class="p header-action-btn metro-prominent" id="metroTogBtn" data-i18n-title="metro_btn" title="Metronomo">🥁 <span data-i18n="metro_btn_lbl">Metronomo</span></button>
      <button class="p header-action-btn" id="resetBtn" data-i18n-title="reset_btn" title="Reset Tastiera">🔄 <span data-i18n="reset_btn">Reset</span></button>
    </div>

    <!-- Scale Selectors -->
    <div class="scroller-row scales-row">
      <div class="sg-tabs" id="sgTabs">
        <div class="sg-tab on" data-g="base" data-i18n="base">Base</div>
        <div class="sg-tab"    data-g="modes" data-i18n="modes">Modi</div>
        <div class="sg-tab"    data-g="arps" data-i18n="arps">Arp</div>
        <div class="sg-tab"    data-g="other" data-i18n="other">Altro</div>
      </div>
      <div class="panels-hz scales-scroll">
        <div id="sg-base"  class="sg-panel show" data-g="base"></div>
        <div id="sg-modes" class="sg-panel"      data-g="modes"></div>
        <div id="sg-arps"  class="sg-panel"      data-g="arps"></div>
        <div id="sg-other" class="sg-panel"      data-g="other"></div>
      </div>
    </div>

    <!-- Display Options Row -->
    <div class="display-opts-row" id="displayOptsRow">
      <select id="tuningCtrl" class="opt-sel" title="Accordatura"></select>
      <select id="labelCtrl" class="opt-sel" title="Etichette">
        <option value="deg" data-i18n="degrees">Gradi</option>
        <option value="note" data-i18n="notes">Note (C,D,E)</option>
        <option value="solfege" data-i18n="solfege">Note (Do,Re,Mi)</option>
        <option value="finger" data-i18n="finger">Dita (Box)</option>
      </select>
      <select id="viewCtrl" class="opt-sel" title="Vista">
        <option value="full" data-i18n="all">Tutto</option>
        <option value="box" data-i18n="box">Box 5fr</option>
      </select>
      <select id="handCtrl" class="opt-sel" title="Mano">
        <option value="right" data-i18n="right">Destro</option>
        <option value="left" data-i18n="lefty">Mancino</option>
      </select>
    </div>
  </div>
</header>
