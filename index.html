<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Bassmate — Interactive Bass Fretboard & Scales Explorer</title>
  <meta name="description" content="Bassmate is a free, interactive bass guitar fretboard explorer. Generate scales, arpeggios, alternate tunings, play audio, and practice with the built-in metronome and quiz mode.">
  <meta name="keywords" content="bass, fretboard, scale generator, bass scale, bass arpeggio, interactive bass, learn bass, bass quiz, metronome, alternate tuning, drop d, bass chords">
  <meta name="author" content="PiscoFactory">
  <meta name="robots" content="index, follow">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://robypisco.github.io/bassmate/">
  <meta property="og:title" content="Bassmate — The Ultimate Bass Explorer">
  <meta property="og:description" content="Interactive fretboard, audio playback, metronome, and quiz. Level up your bass playing for free.">
  <meta property="og:image" content="https://robypisco.github.io/bassmate/icon.svg">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://robypisco.github.io/bassmate/">
  <meta property="twitter:title" content="Bassmate — Interactive Bass Assistant">
  <meta property="twitter:description" content="Discover scales, arpeggios, and train your ear with the free interactive bass fretboard app.">
  <meta property="twitter:image" content="https://robypisco.github.io/bassmate/icon.svg">
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#080810">
  <link rel="apple-touch-icon" href="icon.svg">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <!-- ================= TOP DASHBOARD (INJECTED) ================= -->
  <div id="header-placeholder"></div>

  <!-- ================= MAIN & FRETBOARD ================= -->
  <main class="main">
    <div class="scale-info" id="scaleInfo"></div>

    <div class="pos-bar hide" id="posBar">
      <button class="pos-nav" id="posL">◀</button>
      <span class="pos-txt" id="posTxt"></span>
      <button class="pos-nav" id="posR">▶</button>
    </div>

    <div class="fb-area">
      <div class="fb-layout" id="fretboard"></div>
    </div>

    <div id="quizPanel" class="quiz-panel">
      <div class="quiz-hud">
        <div class="quiz-timer-bar"><div class="quiz-timer-fill" id="quizTimerFill"></div></div>
        <div class="quiz-hud-row">
          <div class="quiz-score" id="quizScore" data-i18n="quiz_initial">Punteggio: 0</div>
          <div class="quiz-combo" id="quizCombo">Combo x1</div>
          <div class="quiz-time" id="quizTime">⏱️ 60s</div>
        </div>
        <div class="quiz-controls" style="display:flex; justify-content:center; gap:10px; padding-bottom:12px;">
          <button id="quizStartBtn" class="quiz-ctrl-btn">▶️ Start</button>
          <button id="quizStopBtn" class="quiz-ctrl-btn">⏹️ Stop</button>
          <button id="quizResetBtn" class="quiz-ctrl-btn">🔄 Reset</button>
        </div>
      </div>
      <div class="quiz-btns" id="quizBtns"></div>
      <div class="quiz-stats-bar" id="quizStatsBar"></div>
    </div>

    <!-- ================= METRONOME PANEL ================= -->
    <div id="metroPanel" class="metro-panel">
      <div class="metro-ui">
        <div class="metro-beats" id="metroBeatDots"></div>
        <div class="metro-bpm-row">
          <button class="metro-bpm-btn" id="metroBpmDn" aria-label="BPM Down">−</button>
          <div class="metro-bpm-center">
            <div class="metro-bpm-num" id="metroBpmNum">80</div>
            <div class="metro-bpm-label">BPM</div>
          </div>
          <button class="metro-bpm-btn" id="metroBpmUp" aria-label="BPM Up">+</button>
        </div>
        <input type="range" id="metroBpmSlider" min="30" max="240" value="80" class="metro-slider" aria-label="BPM Slider">
        <div class="metro-controls">
          <label class="metro-sig-label">
            <span data-i18n="metro_sig">Battuta</span>
            <select id="metroTimeSig">
              <option value="2">2/4</option>
              <option value="3">3/4</option>
              <option value="4" selected>4/4</option>
              <option value="6">6/8</option>
            </select>
          </label>
          <button id="metroStartBtn" class="metro-start-btn">▶ <span data-i18n="metro_start">Start</span></button>
        </div>
      </div>
    </div>

    <div class="legend" id="fbLegend">
      <div class="li"><div class="ld" style="background:var(--root-c); box-shadow: 0 0 8px var(--root-g)"></div><span data-i18n="pos_root">Nota radice</span></div>
      <div class="li"><div class="ld" style="background:var(--note-c); box-shadow: 0 0 8px var(--note-g)"></div><span data-i18n="pos_note">Nota della scala</span></div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="app.js"></script>
</body>
</html>
