<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Teacher Mode - Blank Fretboards</title>
  <style>
    body { background: #fff; color: #111; padding: 30px; font-family: sans-serif; display:flex; flex-direction:column;}
    .grid-container {
      display: flex; flex-direction: column; gap: 40px; margin: 0 auto; max-width: 1000px; width: 100%;
    }
    .hw-header { text-align: center; margin-bottom: 20px; }
    .hw-header input { border: none; border-bottom: 1px solid #000; font-family: inherit; font-size: 16px; outline:none; }
    
    .fret-nums { position: relative; height: 20px; font-size: 12px; color: #666; margin-top: 5px; }
    .fret-n { position: absolute; transform: translateX(-50%); text-align: center; }
    
    @media print {
      @page { size: A4 portrait; margin: 1.2cm 1.5cm; }
      body { margin: 0; padding: 0; background: #fff !important; }
      #printBtn, #backBtn, #stringCtrl, label, #dl-ctrl { display: none !important; }
      .hw-header input { border-bottom: 1px solid #000 !important; }
      .grid-container { gap: 18px !important; }
      svg { height: 100px !important; }
      /* forza tutto su una sola pagina */
      .grid-container, .hw-header { page-break-after: avoid; page-break-inside: avoid; }
      html, body { overflow: hidden; height: auto; }
    }
  </style>
</head>
<body>
  <div class="hw-header">
    <div class="lang-float" id="dl-ctrl" style="position:absolute; top:20px; right:20px; display:flex; gap:4px;">
       <button class="p on" data-v="it" style="padding:4px 8px; cursor:pointer;">IT</button>
       <button class="p" data-v="en" style="padding:4px 8px; cursor:pointer;">EN</button>
    </div>
    <h1 id="title-text">Bass Study Session</h1>
    <p>
      <span id="stud-text">Studente</span>: <input type="text" style="width:200px"> &nbsp;&nbsp;&nbsp; 
      <span id="date-text">Data</span>: <input type="text" style="width:100px"> &nbsp;&nbsp;&nbsp; 
      <span id="note-text">Note</span>: <input type="text" style="width:150px">
    </p>
    <div style="display:flex; justify-content:center; align-items:center; gap: 15px; margin-top: 20px;">
      <label style="font-size:14px; font-weight:bold;">
        Strings: 
        <select id="stringCtrl" style="padding:5px; border-radius:6px; border:1px solid #7c3aed;">
          <option value="4">4 Strings</option>
          <option value="5">5 Strings</option>
          <option value="6">6 Strings</option>
        </select>
      </label>
      <button id="backBtn" onclick="window.location.href='index.html'" style="padding:10px 20px; border:1px solid #7c3aed; color:#7c3aed; background:transparent; border-radius:8px; cursor:pointer; font-weight:bold;">← Torna al Manico</button>
      <button id="printBtn" onclick="window.print()" style="padding:10px 20px; background:#7c3aed; color:#fff; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">🖨️ Stampa Ora</button>
    </div>
  </div>
  
  <div style="max-width: 1000px; margin: 0 auto; width: 100%; text-align:right; font-size:10px; color:#999; margin-bottom: 20px;">Generated by <strong>Bassmate</strong></div>
  
  <div class="grid-container" id="gc"></div>

  <script>
    const container = document.getElementById('gc');
    const frets = 15;
    let stringsCount = 4;
    const markers = [3,5,7,9,12,15];

    let activeLang = localStorage.getItem('bass_lang') || (navigator.language.startsWith('it') ? 'it' : 'en');

    function renderGrids() {
      container.innerHTML = '';
      for(let i=0; i<5; i++) {
        const wrapper = document.createElement('div');
        const svgn = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(svgn, 'svg');
        svg.setAttribute('width', '100%');
        svg.setAttribute('height', '120');
        svg.style.border = '1pt solid #000';
        svg.style.borderLeft = '5pt solid #000'; 
        svg.style.display = 'block';
        svg.style.background = '#fff';
        
        for(let f=1; f<=frets; f++) {
          const line = document.createElementNS(svgn, 'line');
          const x = f * (100 / frets);
          line.setAttribute('x1', x + '%');
          line.setAttribute('y1', '0');
          line.setAttribute('x2', x + '%');
          line.setAttribute('y2', '100%');
          line.setAttribute('stroke', '#000');
          line.setAttribute('stroke-width', '1');
          svg.appendChild(line);
        }
        
        markers.forEach(pos => {
          if(pos > frets) return;
          const addDot = (yPercent) => {
            const circle = document.createElementNS(svgn, 'circle');
            const cx = (pos - 0.5) * (100 / frets);
            circle.setAttribute('cx', cx + '%');
            circle.setAttribute('cy', yPercent);
            circle.setAttribute('r', '5');
            circle.setAttribute('fill', '#e5e7eb');
            svg.appendChild(circle);
          };
          if(pos === 12) { addDot('25%'); addDot('75%'); }
          else { addDot('50%'); }
        });
        
        for(let s=0; s<stringsCount; s++) {
          const line = document.createElementNS(svgn, 'line');
          const y = (s + 0.5) * (120 / stringsCount);
          line.setAttribute('x1', '0');
          line.setAttribute('y1', y);
          line.setAttribute('x2', '100%');
          line.setAttribute('y2', y);
          line.setAttribute('stroke', '#000');
          line.setAttribute('stroke-width', '1.5');
          svg.appendChild(line);
        }
        wrapper.appendChild(svg);
        const nums = document.createElement('div');
        nums.className = 'fret-nums';
        for(let f=1; f<=frets; f++) {
           const n = document.createElement('div'); n.className = 'fret-n'; n.innerText = f;
           n.style.left = `calc((${f - 0.5}) * (100% / ${frets}))`;
           nums.appendChild(n);
        }
        wrapper.appendChild(nums);
        container.appendChild(wrapper);
      }
    }

    function setLang(l) {
      activeLang = l;
      localStorage.setItem('bass_lang', l);
      document.querySelectorAll('#dl-ctrl [data-v]').forEach(b => b.classList.toggle('on', b.dataset.v === l));
      
      const isIt = l === 'it';
      document.getElementById('title-text').innerText = isIt ? 'Sessione di Studio Basso' : 'Bass Study Session';
      document.getElementById('stud-text').innerText = isIt ? 'Studente' : 'Student';
      document.getElementById('date-text').innerText = isIt ? 'Data' : 'Date';
      document.getElementById('note-text').innerText = isIt ? 'Note' : 'Notes';
      document.getElementById('backBtn').innerText = isIt ? '← Torna al Manico' : '← Back to App';
      document.getElementById('printBtn').innerText = isIt ? '🖨️ Stampa Ora' : '🖨️ Print Now';
    }

    document.getElementById('stringCtrl').addEventListener('change', e => {
      stringsCount = +e.target.value;
      renderGrids();
    });

    document.getElementById('dl-ctrl').addEventListener('click', e => {
      const btn = e.target.closest('[data-v]');
      if(!btn) return;
      setLang(btn.dataset.v);
    });

    setLang(activeLang);
    renderGrids();
  </script>
</body>
</html>
